command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000

env:
  - name: DATABRICKS_LAKEBASE_HOST
    value: "ep-sparkling-truth-d2q43hj7.database.us-east-1.cloud.databricks.com"
  - name: DATABRICKS_LAKEBASE_DB
    value: "audio_insight_hub"

resources:
  - name: audio-insight-serving-endpoint
    serving_endpoint:
      name: databricks-claude-sonnet-4
      permission: CAN_QUERY
  - name: audio-insight-sql-warehouse
    sql_warehouse:
      name: Serverless Starter Warehouse
      permission: CAN_USE
